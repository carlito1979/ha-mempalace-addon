name: MemPalace MCP Server
version: "3.3.0"
slug: mempalace
description: >-
  Persistent AI memory MCP server with knowledge graph, BM25 hybrid search,
  and cross-wing tunnels for Claude Code, Claude.ai and Cowork.
  Runs MemPalace with mcp-proxy HTTP/SSE bridge on port 8765.
  Includes web terminal via HA ingress.
url: https://github.com/carlito1979/ha-mempalace-addon
arch:
  - amd64
startup: application
boot: auto
init: false

ingress: true
ingress_port: 7681

ports:
  8765/tcp: 8765
ports_description:
  8765/tcp: "MemPalace MCP HTTP/SSE endpoint"

map:
  - type: share
    read_only: false

watchdog: "http://[HOST]:[PORT:8765]/sse"

options:
  identity_name: ""
  identity_role: ""
  identity_projects: ""
  log_level: "info"

schema:
  identity_name: str
  identity_role: str
  identity_projects: str
  log_level: "list(trace|debug|info|notice|warning|error|fatal)"
